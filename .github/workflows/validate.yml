name: Validate Tree

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate tree
        run: npx -p first-tree first-tree tree verify
