name: Generate CODEOWNERS

on:
  pull_request:
    branches: [main, master]
    paths:
      - "**/NODE.md"

jobs:
  codeowners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate CODEOWNERS from tree ownership
        run: npx -p first-tree first-tree generate-codeowners
      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code .github/CODEOWNERS || echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Commit CODEOWNERS
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/CODEOWNERS
          git commit -m "chore: auto-generate CODEOWNERS from tree ownership"
          git push
