name: Update CODEOWNERS

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'first-tree/sync-*'

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'first-tree/sync-') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npx -p first-tree first-tree tree generate-codeowners

      - name: Commit if changed
        run: |
          git add .github/CODEOWNERS
          git diff --cached --quiet .github/CODEOWNERS && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update CODEOWNERS from tree ownership"
          git push
